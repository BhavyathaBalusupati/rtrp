<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    text-align:center;
}

h2{
    background:#333;
    color:white;
    padding:12px;
    margin:0;
}

table{
    margin:30px auto;
    border-collapse:collapse;
    width:90%;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

th,td{
    border:1px solid #ccc;
    padding:12px;
}

th{
    background:#444;
    color:white;
}

.pending{
    color:red;
    font-weight:bold;
}

.in-progress{
    color:orange;
    font-weight:bold;
}

.resolved{
    color:green;
    font-weight:bold;
}

.no-data{
    padding:20px;
    font-weight:bold;
}
</style>

</head>

<body>

<h2>Admin - Lab Issues Dashboard</h2>

<table id="issueTable">

<tr>
    <th>Reported By</th>
    <th>Lab Name</th>
    <th>System Number</th>
    <th>Problem</th>
    <th>Status</th>
</tr>

</table>

<script>

const issues = JSON.parse(localStorage.getItem("issues")) || [];
const table = document.getElementById("issueTable");

if(issues.length === 0){
    const row = table.insertRow();
    const cell = row.insertCell(0);
    cell.colSpan = 5;
    cell.className = "no-data";
    cell.innerHTML = "No issues reported";
}

issues.forEach(issue => {

    const row = table.insertRow();

    const userCell = row.insertCell(0);
    const labCell = row.insertCell(1);
    const systemCell = row.insertCell(2);
    const problemCell = row.insertCell(3);
    const statusCell = row.insertCell(4);

    // Show Roll No or Lecturer Name
    userCell.innerHTML = issue.rollno || issue.lecturer;

    labCell.innerHTML = issue.lab;
    systemCell.innerHTML = issue.system;
    problemCell.innerHTML = issue.problem;
    statusCell.innerHTML = issue.status;

    if(issue.status === "Pending") statusCell.className = "pending";
    else if(issue.status === "In Progress") statusCell.className = "in-progress";
    else if(issue.status === "Resolved") statusCell.className = "resolved";

});

</script>

</body>
</html>
